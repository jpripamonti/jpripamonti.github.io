items:
  - title: "suacir"
    description: "An R package that downloads citizen request data (SUACI) from the Buenos Aires City Government's open data portal and automatically cleans and repairs inconsistent latitude and longitude coordinates."
    links:
      - label: "Repository"
        url: "https://github.com/jpripamonti/suacir"

  - title: "DualAudio"
    description: "A macOS prototype that creates a virtual output device named Dual Audio and mirrors audio from it to two selected physical output devices. It is intended for setups such as two Bluetooth headphones or a combination of wired and Bluetooth devices."
    note: "Direct package downloads are currently disabled while release signing, notarization, checksums, and installation notes are reviewed. Use the repository for source and status."
    links:
      - label: "Repository"
        url: "https://github.com/jpripamonti/dual_audio"

  - title: "Ludus Scaccorum"
    description: "A single- and two-player chess analysis game based on real gameplay. It presents positions drawn from a selected player's recent games, and players evaluate them by choosing the best move. Scoring depends on how closely their choices align with the engine's recommendation."
    links:
      - label: "Repository"
        url: "https://github.com/jpripamonti/ludus_scaccorum"
      - label: "Play Game"
        url: "https://jpripamonti.github.io/ludus_scaccorum/"

  - title: "EURAXESS Improved Search"
    description: "An alternative search interface for the EURAXESS platform that leverages semantic search capabilities to deliver more relevant and meaningful job listings."
    links:
      - label: "Repository"
        url: "https://github.com/jpripamonti/euraxess-improved-search"
