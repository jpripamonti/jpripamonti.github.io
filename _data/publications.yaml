  - title: "Transparency and trust in government. A multi-mechanism framework."
    authors: "Juan Pablo Ripamonti, Greg Porumbescu"
    venue: "🚧 In preparation"
    sourceLink: ""
    abstract: "Transparency is often promoted as a mechanism to enhance citizen trust in public institutions. However, empirical evidence reveals a nuanced reality: transparency can both strengthen and undermine trust. These mixed findings underscore the need for a deeper understanding of how transparency influences trust, accounting for micro-, meso-, and macro-level pathways, as well as its gradual, indirect, and diffuse effects. Drawing on insights from public administration and political science, this paper proposes a multi-level theoretical framework that synthesizes existing explanations of the transparency-trust relationship. The framework addresses the interplay between individual, organizational, and institutional dynamics, offering a structured approach to reinterpret empirical findings and guide the design of effective transparency policies."
    #preprint: "http://arxiv.org/abs/2309.11599"
    #prereg: "https://osf.io/kwbev?view_only=c5639dcc6292482b8bd79f2086b38d24"
    #year: "2023"
    selected: y


  - title: "3D Printing: A New Industrial Revolution?"
    authors: "Juan Pablo Ripamonti"
    venue: "📚 In: Kléber Ghimire (ed.), Future Courses of Human Societies: Critical Reflections from the Natural and Social Sciences. Routledge"
    sourceLink: "https://www.pnas.org"
    #preprint: "https://arxiv.org/abs/2206.07271"
    #data: "https://osf.io/284yv/"
    #prereg: ""
    #paper_pdf: ""
    abstract: "This chapter examines the transformative potential of additive manufacturing (AM), or 3D printing, as a catalyst for a new industrial revolution. It contrasts AM with the traditional factory system, discussing how AM could decentralize production and enable mass customization. By presenting two scenarios, the chapter explores the economic and social impacts of widespread AM adoption, including shifts in labor markets, challenges to global supply chains, and issues surrounding intellectual property in a digital world. The discussion concludes by considering the broader implications of AM, highlighting its potential to democratize production and reduce waste while raising critical questions about economic stability and the future of work."
    year: "2018"
    selected: y



