  - title: "Strategies for mediating downstream citizen voice into public policy and service ecosystems - what, how and why?"
    authors: "Rebecca Kirley, Juan Pablo Ripamonti, Maria Cucciniello"
    venue: "📨 Manuscript submitted for publication"
    sourceLink: ""
    abstract: "Citizen voice is solicited in government to hold providers accountable, advance democratic values, and improve service delivery. Downstream citizen voice, such as complaints, can reveal pressure points, diverse needs, and failures in complex service ecosystems. However, theory and evidence on how noisy, unstructured citizen voice is mediated into policy and service arenas remain limited. Addressing this gap, this project looks to ombud institutions and related actors, which span citizen–state boundaries and policy networks. We use a qualitative approach to elaborate the concept of citizen voice mediation and to explore what strategies ombuds use to mediate downstream voice, and what drives these choices. Findings from interpretivist analysis of documents and interviews in Italy, the UK, and Argentina identify three outward mediation repertoires—authoritative‑targeted, facilitative‑collectivizing, and making information accessible and meaningful—expressed through directive (AR), hybrid (IT), and curatorial (UK) profiles. These strategies are shaped by different forms of ecosystemic fragmentation and actor capacities. The study advances a novel theorization of citizen voice mediation, develops positive propositions for testing, and deepens understanding of how voice can be strategically mediated to foster change in complex policy and service ecosystems."
    selected: y


  - title: "3D Printing: A New Industrial Revolution?"
    authors: "Juan Pablo Ripamonti"
    venue: "📚 In: Kléber Ghimire (ed.), Future Courses of Human Societies: Critical Reflections from the Natural and Social Sciences. Routledge"
    sourceLink: ""
    #preprint: ""
    #data: ""
    #prereg: ""
    #paper_pdf: ""
    abstract: "This chapter examines the transformative potential of additive manufacturing (AM), or 3D printing, as a catalyst for a new industrial revolution. It contrasts AM with the traditional factory system, discussing how AM could decentralize production and enable mass customization. By presenting two scenarios, the chapter explores the economic and social impacts of widespread AM adoption, including shifts in labor markets, challenges to global supply chains, and issues surrounding intellectual property in a digital world. The discussion concludes by considering the broader implications of AM, highlighting its potential to democratize production and reduce waste while raising critical questions about economic stability and the future of work."
    year: "2018"
    selected: y

