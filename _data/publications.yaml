  - title: "Does being informed about government transparency boost trust? Exploring an overlooked mechanism"
    authors: "Juan Pablo Ripamonti"
    venue: "📄 Government Information Quarterly"
    #sourceLink: ""
    paper_pdf: "https://www.sciencedirect.com/science/article/pii/S0740624X24000522"
    abstract: |
      Governments implement transparency policies aiming to enhance citizens' trust, but the outcomes of these efforts are complex and not fully understood. Existing literature often focuses on how citizens consume government information, but tends to overlook the impact of the act of disclosure itself. This study seeks to fill this gap by examining citizens' responses to the act of government disclosure, independent of the content disclosed. Through a factorial survey experiment, the research manipulates motivations, types, and levels of information disclosure across two distinct organizations to assess their impact on public trust. The findings reveal that the act of disclosure generally enhances trust perceptions, but this effect is significantly modulated by individuals' pre-existing attitudes toward transparency. Those indifferent about transparency do not show increased trust, while for those who value transparency, trust increases notably. The study also finds that the disclosure of performance information, particularly when combined with financial information, has the most substantial impact on trust. Moreover, public trust is higher when organizations disclose more information than legally required. These results contribute to a more nuanced understanding of how government transparency influences public trust and highlight the importance of considering citizen attitudes in transparency initiatives.
    year: "2024"
    selected: y

  - title: "How Transparency Influences Trust in Government: A Multi-Mechanism Framework."
    authors: "Juan Pablo Ripamonti, Greg Porumbescu, Greta Nasi"
    venue: "📨 Manuscript submitted for publication"
    sourceLink: ""
    abstract: "While the relationship between transparency and trust in government is increasingly recognized as complex, existing theories offer fragmented accounts that focus on different aspects of the relationship. As a result, we lack clear explanations for divergent empirical findings and for when transparency affects trust. We address this gap by developing an integrative framework grounded in citizens’ attribution processes. We argue that transparency shapes trust in public organizations by providing cues that citizens use to infer whether an organization has the capacity and orientation to meet expectations. Such cues may arise from disclosure itself, from citizens’ engagement with disclosed information directly or via intermediaries, and from organizational behavioral and performance changes induced by transparency arrangements. We label these pathways disclosure-, information-, and behavior-based mechanisms, and specify key conditions and contextual moderators under which they influence trust. We illustrate the framework using hypothetical scenarios involving police body-worn cameras and hospital performance reporting, and discuss implications for research and the design of transparency initiatives."
