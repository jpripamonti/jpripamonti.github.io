name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  jekyll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.4"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --strict_front_matter --trace
